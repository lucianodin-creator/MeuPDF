<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>MeuPDF v4.8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        #screen-pdf, #screen-sign { position: absolute; inset: 0; display: flex; flex-direction: column; }
        #screen-sign { display: none; background: #111; z-index: 2000; }
        header { background: #1a1a1a; padding: 10px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #333; flex-shrink: 0; touch-action: pan-y; }
        .btn { padding: 12px 18px; border: none; border-radius: 6px; font-weight: bold; color: white; text-transform: uppercase; font-size: 11px; cursor: pointer; }
        #viewer { flex: 1; overflow-y: auto; padding: 15px; background: #121212; display: flex; flex-direction: column; align-items: center; touch-action: pan-y; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 20px; box-shadow: 0 5px 15px #000; line-height: 0; }
        .sig-box { position: absolute; width: 100px; height: 50px; border: 1.5px dashed #007bff; background: rgba(0,123,255,0.05); z-index: 50; }
        .sig-box img { width: 100%; height: 100%; pointer-events: none; }
        .resizer { position: absolute; bottom: -10px; right: -10px; width: 25px; height: 25px; background: #007bff; border-radius: 50%; border: 2px solid #fff; }
        .sign-header { background: #f39c12; color: #000; padding: 12px; text-align: center; font-weight: bold; font-size: 13px; flex-shrink: 0; }
        #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #222; padding: 10px; }
        #canvas-wrapper { background: #fff; width: 95%; max-width: 600px; aspect-ratio: 2 / 1; position: relative; border: 2px solid #555; box-shadow: 0 0 30px #000; }
        canvas#sig-canvas { width: 100%; height: 100%; display: block; }
        .sign-footer { background: #1a1a1a; padding: 15px; display: flex; justify-content: center; gap: 15px; flex-shrink: 0; }
        .footer-tools { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; z-index: 100; }
    </style>
</head>
<body>
    <div id="screen-pdf">
        <header>
            <input type="file" id="pdf-in" style="display:none" accept="application/pdf">
            <button class="btn" style="background:#3498db" onclick="document.getElementById('pdf-in').click()">1. ABRIR PDF</button>
            <button class="btn" style="background:#f39c12" onclick="showSignScreen()">2. ASSINAR</button>
        </header>
        <div id="viewer"></div>
        <div class="footer-tools" id="final-tools"><button class="btn" style="background:#27ae60; padding: 15px 25px;" onclick="saveFinalPdf()">GERAR PDF FINAL</button></div>
    </div>

    <div id="screen-sign">
        <div class="sign-header">MAPEAMENTO HARDWARE v4.8</div>
        <div id="canvas-container">
            <div id="canvas-wrapper">
                <canvas id="sig-canvas"></canvas>
            </div>
        </div>
        <div class="sign-footer">
            <button class="btn" style="background:#27ae60; min-width:90px;" onclick="applySignature()">OK</button>
            <button class="btn" style="background:#e74c3c" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#7f8c8d" onclick="hideSignScreen()">VOLTAR</button>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let pdfData, pad, sigBase64;

        function showSignScreen() {
            if (!document.getElementById('viewer').hasChildNodes()) return alert("Abra o PDF!");
            document.getElementById('screen-pdf').style.display = 'none';
            document.getElementById('screen-sign').style.display = 'flex';
            setTimeout(initPad, 200);
        }
        function hideSignScreen() { document.getElementById('screen-sign').style.display = 'none'; document.getElementById('screen-pdf').style.display = 'flex'; }

        function initPad() {
            const c = document.getElementById('sig-canvas');
            const wrap = document.getElementById('canvas-wrapper');
            const ratio = window.devicePixelRatio || 1;
            
            // Ajuste de resolução interna
            c.width = wrap.offsetWidth * ratio;
            c.height = wrap.offsetHeight * ratio;
            const ctx = c.getContext("2d");
            ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

            if (pad) pad.off();
            
            pad = new SignaturePad(c, { 
                penColor: "rgb(0, 43, 115)", 
                minWidth: 0.8, 
                maxWidth: 1.8 
            });

            // CORREÇÃO DE OFFSET POR PROPORÇÃO PURA
            pad._handlePointerEvents = function(event) {
                event.preventDefault();
                const rect = c.getBoundingClientRect();
                const touch = event.touches ? event.touches[0] : event;
                
                // Calcula onde o toque está em relação ao retângulo visível
                const offsetX = touch.clientX - rect.left;
                const offsetY = touch.clientY - rect.top;

                // Converte para a escala interna do canvas (o "pulo do gato")
                const x = offsetX * (c.width / (rect.width * ratio));
                const y = offsetY * (c.height / (rect.height * ratio));
                
                const point = { x, y, time: Date.now() };
                
                if (event.type.includes('start')) pad._strokeBegin(point);
                else if (event.type.includes('move')) pad._strokeUpdate(point);
                else if (event.type.includes('end')) pad._strokeEnd(point);
            };
        }

        function applySignature() {
            if (pad.isEmpty()) return;
            sigBase64 = pad.toDataURL();
            const pages = document.querySelectorAll('.pdf-page-wrapper');
            pages.forEach(page => {
                const old = page.querySelector('.sig-box'); if(old) old.remove();
                const box = document.createElement('div');
                box.className = 'sig-box';
                box.style.left = "50px"; box.style.top = "50px";
                box.innerHTML = `<img src="${sigBase64}"><div class="resizer"></div>`;
                
                box.addEventListener("touchmove", (e) => {
                    if(e.target.classList.contains('resizer')) return;
                    const r = page.getBoundingClientRect(); const t = e.touches[0];
                    box.style.left = (t.clientX - r.left - (box.offsetWidth/2)) + "px";
                    box.style.top = (t.clientY - r.top - (box.offsetHeight/2)) + "px";
                });

                box.querySelector('.resizer').addEventListener("touchmove", (e) => {
                    e.stopPropagation();
                    const t = e.touches[0]; const r = box.getBoundingClientRect();
                    const nW = t.clientX - r.left; if (nW > 30) { box.style.width = nW + "px"; box.style.height = (nW * 0.5) + "px"; }
                });
                page.appendChild(box);
            });
            document.getElementById('final-tools').style.display = 'block';
            hideSignScreen();
        }

        document.getElementById('pdf-in').onchange = async (e) => {
            const f = e.target.files[0]; if (!f) return;
            pdfData = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
            const view = document.getElementById('viewer'); view.innerHTML = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const p = await pdf.getPage(i);
                const w = document.createElement('div'); w.className = 'pdf-page-wrapper';
                const c = document.createElement('canvas');
                const vp = p.getViewport({scale: (view.clientWidth * 0.95) / p.getViewport({scale:1}).width});
                c.width = vp.width; c.height = vp.height;
                await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
                w.appendChild(c); view.appendChild(w);
            }
        };

        async function saveFinalPdf() {
            const doc = await PDFDocument.load(pdfData);
            const sigPng = await doc.embedPng(sigBase64);
            const pdfPages = doc.getPages();
            document.querySelectorAll('.pdf-page-wrapper').forEach((htmlP, i) => {
                const box = htmlP.querySelector('.sig-box');
                if (box) {
                    const p = pdfPages[i]; const { width, height } = p.getSize();
                    const x = width * (parseFloat(box.style.left) / htmlP.offsetWidth);
                    const y = height - (height * (parseFloat(box.style.top) / htmlP.offsetHeight)) - (height * (box.offsetHeight / htmlP.offsetHeight));
                    p.drawImage(sigPng, {
                        x, y,
                        width: width * (box.offsetWidth / htmlP.offsetWidth), 
                        height: height * (box.offsetHeight / htmlP.offsetHeight)
                    });
                }
            });
            const bytes = await doc.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
            link.download = "Documento_Finalizado.pdf";
            link.click();
        }
    </script>
</body>
</html>
