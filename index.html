<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF - Core Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #menu { background: #222; padding: 15px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #444; }
        .btn { padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        #main-view { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; background: #333; }
        .page-box { position: relative; background: white; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); line-height: 0; }
        #sig-drag { position: absolute; width: 150px; height: 60px; display: none; border: 2px solid #007bff; z-index: 500; touch-action: none; background: rgba(0,123,255,0.1); }
        #sig-tag { position: absolute; top: -30px; left: 0; background: #f39c12; color: black; padding: 4px; font-size: 10px; font-weight: bold; border-radius: 3px; }
        #modal-sig { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #canvas-container { background: white; width: 90%; height: 60%; border-radius: 8px; }
        canvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
    <div id="menu">
        <input type="file" id="pdf-file" style="display:none" accept="application/pdf">
        <button class="btn" style="background:#3498db" onclick="document.getElementById('pdf-file').click()">ABRIR</button>
        <button class="btn" style="background:#f39c12" onclick="showPad()">ASSINAR</button>
        <button class="btn" style="background:#27ae60" onclick="savePdf()">SALVAR</button>
    </div>
    <div id="main-view"></div>
    <div id="sig-drag">
        <div id="sig-tag">PÁGINA: ÚNICA</div>
        <img id="sig-res" style="width:100%; height:100%; object-fit:contain; pointer-events:none;">
    </div>
    <div id="modal-sig">
        <div id="canvas-container"><canvas id="canv"></canvas></div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn" style="background:#2ecc71" onclick="applySig()">CONFIRMAR</button>
            <button class="btn" style="background:#e74c3c" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#95a5a6" onclick="closePad()">SAIR</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
