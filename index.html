<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moraes Shop - Assinador Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #2c3e50; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #toolbar { background: #1a252f; padding: 10px; display: flex; justify-content: center; gap: 8px; z-index: 1000; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; font-size: 13px; text-transform: uppercase; }
        
        #pdf-container { flex: 1; overflow-y: auto; padding: 20px; background: #34495e; display: flex; flex-direction: column; align-items: center; }
        .page-wrapper { position: relative; background: white; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        /* Onde a assinatura fica no PDF */
        #drag-box { 
            position: absolute; width: 150px; height: 65px; display: none; 
            border: 2px dashed #3498db; background: rgba(52, 152, 219, 0.1); 
            z-index: 999; touch-action: none;
        }
        #btn-dupli { position: absolute; top: -35px; left: 0; background: #e67e22; color: white; border: none; padding: 4px 8px; border-radius: 3px; font-size: 10px; }

        /* Modal da Assinatura */
        #modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 10000; flex-direction: column; 
        }
        #canvas-box { flex: 1; background: white; margin: 10px; border-radius: 8px; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>

<div id="toolbar">
    <button class="btn" style="background:#3498db" onclick="document.getElementById('file-in').click()">Abrir</button>
    <button class="btn" style="background:#f39c12" onclick="abrirModal()">Assinar</button>
    <button class="btn" style="background:#27ae60" onclick="gerarPDF()">Salvar</button>
    <input type="file" id="file-in" style="display:none" accept="application/pdf">
</div>

<div id="pdf-container"></div>

<div id="drag-box">
    <button id="btn-dupli">PÁG: ÚNICA</button>
    <img id="sig-img" style="width:100%; height:100%; object-fit:contain;">
</div>

<div id="modal">
    <div style="color:white; text-align:center; padding:10px;">ASSINE ABAIXO</div>
    <div id="canvas-box"><canvas id="canv"></canvas></div>
    <div style="padding:20px; display:flex; justify-content:center; gap:10px;">
        <button class="btn" style="background:#27ae60" onclick="confirmar()">Confirmar</button>
        <button class="btn" style="background:#e74c3c" onclick="pad.clear()">Limpar</button>
        <button class="btn" style="background:#95a5a6" onclick="fechar()">Sair</button>
    </div>
</div>

<script>
let pdfData, pdfLibDoc, pad;
const canv = document.getElementById('canv');
const drag = document.getElementById('drag-box');
const img = document.getElementById('sig-img');
const btnD = document.getElementById('btn-dupli');
const container = document.getElementById('pdf-container');

// 1. Abrir e Renderizar PDF
document.getElementById('file-in').onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    pdfData = await file.arrayBuffer();
    const loading = pdfjsLib.getDocument({data: pdfData});
    const pdf = await loading.promise;
    container.innerHTML = "";
    for(let i=1; i<=pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const wrap = document.createElement('div');
        wrap.className = 'page-wrapper';
        const c = document.createElement('canvas');
        const vp = page.getViewport({scale: (container.clientWidth * 0.95) / page.getViewport({scale:1}).width});
        c.width = vp.width; c.height = vp.height;
        await page.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
        wrap.appendChild(c);
        container.appendChild(wrap);
    }
};

// 2. Modal de Assinatura
function abrirModal() {
    if(!container.hasChildNodes()) return alert("Abra o PDF!");
    document.getElementById('modal').style.display = 'flex';
    const rect = canv.parentElement.getBoundingClientRect();
    canv.width = rect.width; canv.height = rect.height;
    pad = new SignaturePad(canv);
}
function fechar() { document.getElementById('modal').style.display = 'none'; }

function confirmar() {
    if(pad.isEmpty()) return alert("Assine!");
    img.src = pad.toDataURL();
    drag.style.display = 'block';
    container.firstChild.appendChild(drag);
    drag.style.left = "50px"; drag.style.top = "50px";
    fechar();
}

// 3. Controle de Duplicação
btnD.onclick = () => {
    const isTodas = btnD.innerText.includes("TODAS");
    btnD.innerText = isTodas ? "PÁG: ÚNICA" : "PÁG: TODAS";
    btnD.style.background = isTodas ? "#e67e22" : "#27ae60";
};

// 4. Arraste
drag.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const rect = drag.parentElement.getBoundingClientRect();
    const t = e.touches[0];
    drag.style.left = (t.clientX - rect.left - 75) + "px";
    drag.style.top = (t.clientY - rect.top - 32) + "px";
}, {passive: false});

// 5. Salvar Final
async function gerarPDF() {
    if(!pdfData || !img.src) return alert("Falta PDF ou Assinatura!");
    const doc = await PDFLib.PDFDocument.load(pdfData);
    const sImg = await doc.embedPng(img.src);
    const pages = doc.getPages();
    const wrap = container.firstChild;
    
    const rx = parseFloat(drag.style.left) / wrap.offsetWidth;
    const ry = parseFloat(drag.style.top) / wrap.offsetHeight;
    const rw = drag.offsetWidth / wrap.offsetWidth;
    const rh = drag.offsetHeight / wrap.offsetHeight;

    const total = btnD.innerText.includes("TODAS") ? pages.length : 1;
    for(let i=0; i<total; i++) {
        const {width, height} = pages[i].getSize();
        pages[i].drawImage(sImg, {
            x: width * rx, y: height - (height * ry) - (height * rh),
            width: width * rw, height: height * rh
        });
    }
    const bytes = await doc.save();
    const link = document.createElement('a');
    link.href = URL.createObjectURL(new Blob([bytes], {type:'application/pdf'}));
    link.download = "assinado.pdf"; link.click();
}
</script>
</body>
</html>
