<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moraes Shop - Assinador Limpo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #2c3e50; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #toolbar { background: #1a252f; padding: 12px; display: flex; justify-content: center; gap: 10px; z-index: 100; }
        .btn { padding: 12px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-open { background: #3498db; }
        .btn-sign { background: #f39c12; }
        .btn-save { background: #27ae60; }
        
        #pdf-main-container { flex: 1; overflow-y: auto; padding: 20px; background: #34495e; display: flex; flex-direction: column; align-items: center; }
        .page-wrapper { position: relative; background: white; margin-bottom: 20px; box-shadow: 0 5px 25px rgba(0,0,0,0.4); }
        
        #draggable-sig {
            position: absolute; width: 150px; height: 65px; display: none; 
            border: 2px solid #3498db; background: rgba(52, 152, 219, 0.1); 
            touch-action: none; z-index: 99; cursor: move;
        }
        #btn-duplicate { position: absolute; top: -40px; left: 0; background: #e67e22; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        #resizer { position: absolute; bottom: -8px; right: -8px; width: 24px; height: 24px; background: #3498db; border-radius: 50%; border: 2px solid white; }

        #sig-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; flex-direction: column;
        }
        #sig-header { padding: 15px; color: white; text-align: center; font-weight: bold; }
        #sig-canvas-container { flex: 1; background: white; margin: 0 15px; border-radius: 10px; position: relative; overflow: hidden; }
        #sig-canvas { width: 100%; height: 100%; touch-action: none; }
        #sig-footer { padding: 20px; display: flex; justify-content: center; gap: 15px; }
    </style>
</head>
<body>
    <div id="toolbar">
        <input type="file" id="file-in" style="display:none">
        <button class="btn btn-open" onclick="document.getElementById('file-in').click()">ABRIR PDF</button>
        <button class="btn btn-sign" onclick="openSignature()">ASSINAR</button>
        <button class="btn btn-save" onclick="savePDF()">SALVAR PDF</button>
    </div>

    <div id="pdf-main-container"></div>

    <div id="draggable-sig">
        <button id="btn-duplicate">APLICAR: SÓ NESTA</button>
        <img id="sig-preview" style="width:100%; height:100%; pointer-events:none; object-fit:contain;">
        <div id="resizer"></div>
    </div>

    <div id="sig-modal">
        <div id="sig-header">ASSINE DENTRO DA ÁREA BRANCA</div>
        <div id="sig-canvas-container"><canvas id="sig-canvas"></canvas></div>
        <div id="sig-footer">
            <button class="btn btn-save" id="btn-confirm-sig">CONFIRMAR</button>
            <button class="btn" style="background:#c0392b" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#7f8c8d" onclick="closeModal()">CANCELAR</button>
        </div>
    </div>
    <script src="script.js?v=2.0"></script>
</body>
</html>
