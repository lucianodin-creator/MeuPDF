<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF - Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #e0e0e0; color: #333; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #toolbar { background: #2c3e50; padding: 12px; display: flex; justify-content: center; gap: 10px; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-open { background: #2980b9; }
        .btn-sign { background: #e67e22; }
        .btn-save { background: #27ae60; }
        
        /* Container para ver todas as folhas */
        #pdf-main-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .page-wrapper { position: relative; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.15); line-height: 0; }
        
        #draggable-sig {
            position: absolute; width: 150px; height: 60px; display: none; 
            border: 2px dashed #2980b9; background: rgba(41, 128, 185, 0.1); 
            touch-action: none; z-index: 999;
        }
        #btn-duplicate { position: absolute; top: -35px; left: 0; background: #2980b9; color: white; border: none; border-radius: 4px; padding: 6px; }
        #resizer { position: absolute; bottom: -5px; right: -5px; width: 25px; height: 25px; background: #2980b9; clip-path: polygon(100% 0, 100% 100%, 0 100%); cursor: nwse-resize; }

        #sig-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column;
        }
        #sig-canvas-container { background: white; border-radius: 8px; width: 95%; height: 70%; position: relative; }
        #sig-canvas { width: 100%; height: 100%; touch-action: none; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="toolbar">
        <input type="file" id="file-in" accept="application/pdf" style="display:none">
        <button class="btn btn-open" onclick="document.getElementById('file-in').click()">Abrir PDF</button>
        <button class="btn btn-sign" onclick="openSignature()">Assinar</button>
        <button class="btn btn-save" onclick="savePDF()">Salvar PDF</button>
    </div>
    <div id="pdf-main-container"></div>
    <div id="sig-modal">
        <div id="sig-canvas-container"><canvas id="sig-canvas"></canvas></div>
        <div style="margin-top: 15px; display: flex; gap: 15px;">
            <button class="btn btn-save" onclick="applySignature()">Confirmar</button>
            <button class="btn" style="background:#c0392b" onclick="closeModal()">Sair</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
