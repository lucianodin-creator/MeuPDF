<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Assinador v5.20</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; width: 100vw; }
        
        /* Header Centralizado */
        header { background: #111; padding: 10px; display: flex; justify-content: center; gap: 8px; border-bottom: 1px solid #444; min-height: 65px; align-items: center; width: 100%; }
        
        .btn { height: 45px; border: none; border-radius: 6px; font-weight: bold; color: white; font-size: 11px; cursor: pointer; text-transform: uppercase; flex: 1; max-width: 130px; display: flex; align-items: center; justify-content: center; }
        
        #viewer { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; align-items: center; background: #222; width: 100%; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        
        /* Assinatura e Ajustes */
        .sig-box { position: absolute; width: 200px; border: 2px dashed #3498db; background: rgba(52,152,219,0.1); transition: transform 0.05s linear; z-index: 50; }
        .sig-box img { width: 100%; height: auto; display: block; pointer-events: none; }
        
        .handle { position: absolute; width: 32px; height: 32px; border: 4px solid #3498db; background: rgba(255,255,255,0.2); z-index: 100; }
        .tl { top: -10px; left: -10px; border-right: none; border-bottom: none; }
        .tr { top: -10px; right: -10px; border-left: none; border-bottom: none; }
        .bl { bottom: -10px; left: -10px; border-right: none; border-top: none; }
        .br { bottom: -10px; right: -10px; border-left: none; border-top: none; }

        .rotator-btn { position: absolute; top: -60px; left: 50%; transform: translateX(-50%); background: #f39c12; color: #fff; padding: 10px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; border: 2px solid white; z-index: 70; white-space: nowrap; }

        /* Fix Firefox: Barra de ferramentas final sempre centralizada */
        #final-tools { 
            position: fixed; bottom: 0; left: 0; width: 100vw; 
            display: none; flex-direction: row; justify-content: center; align-items: center;
            gap: 10px; background: rgba(0,0,0,0.9); padding: 15px; border-top: 1px solid #444; z-index: 1000; 
        }

        #screen-sign { position: fixed; inset: 0; background: #1a1a1a; z-index: 9999; display: none; flex-direction: column; }
        #canvas-container { flex: 1; width: 96vw; margin: 10px auto; background: #fff; border-radius: 8px; }
        canvas#sig-canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <header>
        <input type="file" id="pdf-in" style="display:none" accept="application/pdf">
        <button class="btn" style="background:#3498db" onclick="document.getElementById('pdf-in').click()">1. ABRIR</button>
        <button id="btn-sign" class="btn" style="background:#f39c12" onclick="showSignScreen()">2. ASSINAR</button>
        <button id="btn-redo" class="btn" style="background:#e67e22; display:none;" onclick="showSignScreen()">REFAZER</button>
    </header>

    <div id="viewer"></div>

    <div id="final-tools">
        <button class="btn" style="background:#2ecc71" onclick="saveFinal(0.9, 'alta')">ALTA</button>
        <button class="btn" style="background:#f1c40f; color:#000" onclick="saveFinal(0.5, 'media')">MÉDIA</button>
        <button class="btn" style="background:#e74c3c" onclick="saveFinal(0.1, 'leve')">LEVE</button>
    </div>

    <div id="screen-sign">
        <div id="canvas-container"><canvas id="sig-canvas"></canvas></div>
        <div style="padding:20px; display:flex; justify-content:center; gap:10px; background:#111; width:100%;">
            <button class="btn" style="background:#27ae60" onclick="applySignature()">OK</button>
            <button class="btn" style="background:#e74c3c" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#7f8c8d" onclick="hideSignScreen()">SAIR</button>
        </div>
    </div>

    <script>
        const { PDFDocument, degrees } = PDFLib;
        let pdfData, pad, sigBase64, originalAspectRatio;

        function showSignScreen() {
            document.getElementById('screen-sign').style.display = 'flex';
            const canvas = document.getElementById('sig-canvas');
            if (!pad) pad = new SignaturePad(canvas, { penColor: "rgb(0, 0, 80)" });
            const ratio = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * ratio; canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").setTransform(ratio, 0, 0, ratio, 0, 0);
        }

        function hideSignScreen() { document.getElementById('screen-sign').style.display = 'none'; }

        function applySignature() {
            if (!pad || pad.isEmpty()) return;
            sigBase64 = pad.toDataURL("image/png");
            hideSignScreen();
            document.getElementById('btn-redo').style.display = 'flex';
            document.getElementById('btn-sign').style.display = 'none';
            const img = new Image(); img.src = sigBase64;
            img.onload = () => {
                originalAspectRatio = img.width / img.height;
                createSigBoxes();
            };
        }

        function createSigBoxes() {
            document.querySelectorAll('.pdf-page-wrapper').forEach(page => {
                const box = document.createElement('div');
                box.className = 'sig-box';
                box.style.height = (200 / originalAspectRatio) + "px";
                box.style.left = "30px"; box.style.top = "50px";
                box.innerHTML = `<div class="rotator-btn" onclick="rotateBox(this)">GIRAR 90° ↻</div><img src="${sigBase64}"><div class="handle tl"></div><div class="handle tr"></div><div class="handle bl"></div><div class="handle br"></div>`;
                box.dataset.rotation = 0;

                box.addEventListener("touchmove", (e) => {
                    if (e.target.className.includes('handle') || e.target.className.includes('rotator')) return;
                    e.preventDefault();
                    const r = page.getBoundingClientRect();
                    box.style.left = (e.touches[0].clientX - r.left - (box.offsetWidth/2)) + "px";
                    box.style.top = (e.touches[0].clientY - r.top - (box.offsetHeight/2)) + "px";
                }, {passive: false});

                box.querySelectorAll('.handle').forEach(handle => {
                    handle.addEventListener("touchmove", (e) => {
                        e.preventDefault(); e.stopPropagation();
                        const t = e.touches[0]; const r = box.getBoundingClientRect();
                        let newW = handle.className.includes('r') ? (t.clientX - r.left) : (r.right - t.clientX);
                        if (newW > 50) {
                            box.style.width = newW + "px";
                            box.style.height = (newW / originalAspectRatio) + "px";
                            if (handle.className.includes('l')) box.style.left = (t.clientX - page.getBoundingClientRect().left) + "px";
                        }
                    }, {passive: false});
                });
                page.appendChild(box);
            });
            document.getElementById('final-tools').style.display = 'flex';
        }

        function rotateBox(el) {
            const box = el.parentElement;
            let rot = (parseInt(box.dataset.rotation) || 0) + 90;
            box.dataset.rotation = rot >= 360 ? 0 : rot;
            box.style.transform = `rotate(${box.dataset.rotation}deg)`;
        }

        document.getElementById('pdf-in').onchange = async (e) => {
            pdfData = await e.target.files[0].arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
            const view = document.getElementById('viewer'); view.innerHTML = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const p = await pdf.getPage(i);
                const w = document.createElement('div'); w.className = 'pdf-page-wrapper';
                const c = document.createElement('canvas');
                const vp = p.getViewport({scale: (view.clientWidth * 0.95) / p.getViewport({scale:1}).width});
                c.width = vp.width; c.height = vp.height;
                await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
                w.appendChild(c); view.appendChild(w);
            }
        };

        async function saveFinal(qual, nome) {
            const doc = await PDFDocument.load(pdfData);
            const sigImg = await doc.embedJpg(pad.toDataURL("image/jpeg", qual));
            const pages = doc.getPages();
            document.querySelectorAll('.pdf-page-wrapper').forEach((htmlP, i) => {
                const box = htmlP.querySelector('.sig-box');
                if (box && pages[i]) {
                    const p = pages[i]; const { width, height } = p.getSize();
                    const rot = parseInt(box.dataset.rotation) || 0;
                    const pdfW = width * (box.offsetWidth / htmlP.offsetWidth);
                    const pdfH = height * (box.offsetHeight / htmlP.offsetHeight);
                    const pdfX = width * (parseFloat(box.style.left) / htmlP.offsetWidth);
                    const pdfY = height - (height * (parseFloat(box.style.top) / htmlP.offsetHeight)) - pdfH;
                    p.drawImage(sigImg, { x: pdfX + (pdfW / 2), y: pdfY + (pdfH / 2), width: pdfW, height: pdfH, rotate: degrees(-rot), xAnchor: 'center', yAnchor: 'center' });
                }
            });
            const bytes = await doc.save();
            const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
            link.download = `pdf_${nome}.pdf`; link.click();
        }
    </script>
</body>
</html>
